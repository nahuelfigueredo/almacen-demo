<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Productos</title>
  <link rel="stylesheet" href="./css/styles.css">
<script src="./js/app.js"></script>

</head>
<body>
  <header class="top">
    <div class="wrap top__inner">
      <div class="brand">
        <div class="brand__logo">A</div>
        <div>
          <div class="brand__name">Productos</div>
          <div class="brand__sub">Alta / Edición / Stock / Precio</div>
        </div>
      </div>
      <div class="row">
        <a class="btn" href="./index.html">Volver</a>
        <a class="btn btn--primary" href="./caja.html">Ir a Caja</a>
      </div>
    </div>
  </header>

  <main class="wrap split">
    <section class="section">
      <h3>Listado</h3>
      <div class="row" style="margin-bottom:10px">
        <div style="flex:1;min-width:260px">
          <label>Buscar</label>
          <input id="q" placeholder="Nombre o categoría..." />
        </div>
        <div style="width:200px">
          <label>Filtrar categoría</label>
          <input id="catFilter" placeholder="Ej: Bebidas" />
        </div>
      </div>

      <div style="overflow:auto">
        <table class="table" id="tbl">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Cat.</th>
              <th>Código</th>
              <th>Stock</th>
              <th>Mín</th>
              <th>Precio</th>
              <th style="width:150px"></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="muted" style="margin-top:10px">
        Tip: si usás lector USB, podés completar “Código de barras” escaneando dentro del input.
      </div>
    </section>

    <aside class="section">
      <h3 id="formTitle">Nuevo producto</h3>

      <input id="id" type="hidden" />

      <label>Nombre</label>
      <input id="name" placeholder="Ej: Yerba 1kg / Queso (kg)" />

      <div class="row" style="margin-top:10px">
        <div style="flex:1">
          <label>Categoría</label>
          <input id="category" placeholder="Ej: Almacén, Bebidas..." />
        </div>
        <div style="flex:1">
          <label>Código de barras (opcional)</label>
          <input id="barcode" placeholder="Escaneá o escribí..." />
        </div>
      </div>

      <div class="row" style="margin-top:10px">
        <div style="flex:1">
          <label>Costo (opcional)</label>
          <input id="cost" type="number" step="0.01" min="0" value="0" />
        </div>
        <div style="flex:1">
          <label>Precio</label>
          <input id="price" type="number" step="0.01" min="0" value="0" />
        </div>
      </div>

      <div class="row" style="margin-top:10px">
        <div style="flex:1">
          <label>Stock (decimal)</label>
          <input id="stock" type="number" step="0.001" min="0" value="0" />
        </div>
        <div style="flex:1">
          <label>Stock mínimo</label>
          <input id="minStock" type="number" step="0.001" min="0" value="0" />
        </div>
      </div>

      <div class="row" style="margin-top:12px">
        <button class="btn btn--primary" id="btnSave" style="flex:1">Guardar</button>
        <button class="btn" id="btnNew">Nuevo</button>
      </div>

      <div class="row" style="margin-top:10px">
        <button class="btn btn--danger" id="btnDelete" style="flex:1" disabled>Eliminar</button>
      </div>
    </aside>
  </main>

  <script src="./js/app.js"></script>

  <script>
    App.guardPage(App.PERMS.admin_or_owner);


    window.App.ensureSeed();

    const q = document.getElementById("q");
    const catFilter = document.getElementById("catFilter");
    const tbody = document.querySelector("#tbl tbody");

    const formTitle = document.getElementById("formTitle");
    const idEl = document.getElementById("id");
    const nameEl = document.getElementById("name");
    const categoryEl = document.getElementById("category");
    const barcodeEl = document.getElementById("barcode");
    const costEl = document.getElementById("cost");
    const priceEl = document.getElementById("price");
    const stockEl = document.getElementById("stock");
    const minStockEl = document.getElementById("minStock");

    const btnDelete = document.getElementById("btnDelete");

    function readForm(){
      const id = idEl.value || App.uid("prod");
      return {
        id,
        name: nameEl.value.trim(),
        category: categoryEl.value.trim(),
        barcode: barcodeEl.value.trim(),
        cost: App.num(costEl.value),
        price: App.num(priceEl.value),
        stock: App.roundQty(stockEl.value),
        minStock: App.roundQty(minStockEl.value),
        active: true
      };
    }

    function setForm(p){
      idEl.value = p?.id || "";
      nameEl.value = p?.name || "";
      categoryEl.value = p?.category || "";
      barcodeEl.value = p?.barcode || "";
      costEl.value = App.num(p?.cost || 0);
      priceEl.value = App.num(p?.price || 0);
      stockEl.value = App.roundQty(p?.stock || 0);
      minStockEl.value = App.roundQty(p?.minStock || 0);

      const editing = !!p?.id;
      formTitle.textContent = editing ? "Editar producto" : "Nuevo producto";
      btnDelete.disabled = !editing;
    }

    function render(){
      const text = q.value.trim().toLowerCase();
      const cat = catFilter.value.trim().toLowerCase();

      const list = App.getProducts()
        .filter(p => (p.active !== false))
        .filter(p => !text || (p.name||"").toLowerCase().includes(text) || (p.category||"").toLowerCase().includes(text))
        .filter(p => !cat || (p.category||"").toLowerCase().includes(cat));

      tbody.innerHTML = "";
      list.forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><strong>${p.name}</strong></td>
          <td>${p.category || "-"}</td>
          <td><small>${p.barcode || "-"}</small></td>
          <td>${App.roundQty(p.stock)}</td>
          <td><small>${App.roundQty(p.minStock||0)}</small></td>
          <td><strong>${App.money(p.price)}</strong></td>
          <td>
            <button class="btn" data-edit="${p.id}">Editar</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      tbody.querySelectorAll("button[data-edit]").forEach(btn=>{
        btn.onclick = () => {
          const p = App.findProductById(btn.dataset.edit);
          setForm(p);
          App.toast("Editando producto");
        };
      });
    }

    document.getElementById("btnSave").onclick = () => {
      const p = readForm();
      if(!p.name) return App.toast("Falta nombre");
      if(p.price <= 0) return App.toast("Precio inválido");
      App.upsertProduct(p);
      App.toast("Guardado ✅");
      render();
      setForm(null);
    };

    document.getElementById("btnNew").onclick = () => setForm(null);

    btnDelete.onclick = () => {
      const id = idEl.value;
      if(!id) return;
      App.deleteProduct(id);
      App.toast("Eliminado");
      render();
      setForm(null);
    };

    q.addEventListener("input", render);
    catFilter.addEventListener("input", render);

    render();
    setForm(null);
  </script>
</body>
</html>
